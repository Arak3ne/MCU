# Remote Supabase project ref — must match `VITE_SUPABASE_URL` (https://<ref>.supabase.co).
# If `supabase db push` says "up to date" while migrations are missing on the dashboard DB,
# run `supabase link --project-ref <same_ref>` after pulling.
project_id = "habjlxqsepiphdyazrcd"

[functions.sync-draft]
enabled = true
verify_jwt = true
import_map = "./functions/sync-draft/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/sync-draft/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/sync-draft/*.html" ]

[functions.sync-match-results]
enabled = true
verify_jwt = true
import_map = "./functions/sync-match-results/deno.json"
entrypoint = "./functions/sync-match-results/index.ts"
